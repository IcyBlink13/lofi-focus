<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoFi Focus — Каталог уроків</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0d1117;--bg-card:#161b22;--bg-card2:#1c2333;
    --border:rgba(255,255,255,0.07);
    --mint:#5ee7bf;--mint-glow:rgba(94,231,191,0.12);
    --blue-soft:#7aa2f7;--lavender:#bb9af7;--streak-hot:#ff9e64;
    --text-main:#e6edf3;--text-muted:#8b949e;--text-dim:#484f58;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-deep);color:var(--text-main);font-family:'DM Sans',sans-serif;min-height:100vh;}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(94,231,191,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(94,231,191,0.025) 1px,transparent 1px);
    background-size:44px 44px;}
  .page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 60px;}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:32px;}
  .nav-logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--mint);text-decoration:none;}
  .nav-logo span{color:var(--text-muted);}
  .nav-links{display:flex;gap:8px;}
  .nav-links a{text-decoration:none;color:var(--text-muted);font-size:14px;padding:6px 14px;border-radius:8px;transition:background .2s,color .2s;}
  .nav-links a:hover{background:var(--bg-card2);color:var(--text-main);}
  .nav-links a.active{color:var(--mint);}
  .nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3ab89a,#7aa2f7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--bg-deep);cursor:pointer;}

  /* HEADER */
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;}
  .page-title{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;}
  .page-title .accent{color:var(--mint);}
  .lessons-count{font-size:13px;color:var(--text-dim);}

  /* FILTERS */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
  .filter-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);font-size:13px;color:var(--text-muted);cursor:pointer;transition:border-color .2s,color .2s,background .2s;font-family:'DM Sans',sans-serif;}
  .filter-btn:hover{border-color:rgba(94,231,191,0.3);color:var(--text-main);}
  .filter-btn.active{border-color:var(--mint);background:var(--mint-glow);color:var(--mint);}
  .filter-btn.lvl-beginner.active{border-color:var(--mint);color:var(--mint);background:var(--mint-glow);}
  .filter-btn.lvl-middle.active{border-color:var(--blue-soft);color:var(--blue-soft);background:rgba(122,162,247,0.1);}
  .filter-btn.lvl-advanced.active{border-color:var(--lavender);color:var(--lavender);background:rgba(187,154,247,0.1);}

  /* SEARCH */
  .search-wrap{margin-left:auto;position:relative;}
  .search-input{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 14px 8px 36px;font-size:13px;color:var(--text-main);font-family:'DM Sans',sans-serif;outline:none;width:200px;transition:border-color .2s,width .3s;}
  .search-input:focus{border-color:rgba(94,231,191,0.3);width:260px;}
  .search-input::placeholder{color:var(--text-dim);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;}

  /* GRID */
  .lessons-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

  /* LESSON CARD */
  .lesson-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;}
  .lesson-card:hover{border-color:rgba(94,231,191,0.3);transform:translateY(-3px);}
  .lesson-card.done{border-color:rgba(94,231,191,0.2);}
  .lesson-card.locked{opacity:.5;pointer-events:none;}

  .card-thumb{height:130px;background:var(--bg-card2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .card-thumb-bg{position:absolute;inset:0;opacity:0.07;}
  .card-thumb-icon{font-size:44px;position:relative;z-index:1;}
  .card-done-badge{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--mint);color:var(--bg-deep);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2;}
  .card-locked-badge{position:absolute;top:10px;right:10px;font-size:18px;z-index:2;}
  .card-num{position:absolute;top:10px;left:10px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);z-index:2;}

  .card-body{padding:16px;flex:1;display:flex;flex-direction:column;}
  .card-inst{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
  .card-title{font-size:14px;font-weight:500;color:var(--text-main);margin-bottom:10px;line-height:1.45;flex:1;}
  .card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .card-pill{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg-card2);color:var(--text-muted);}
  .card-pill.beginner{color:var(--mint);background:var(--mint-glow);}
  .card-pill.middle{color:var(--blue-soft);background:rgba(122,162,247,0.1);}
  .card-pill.advanced{color:var(--lavender);background:rgba(187,154,247,0.1);}
  .card-time{font-size:11px;color:var(--text-dim);margin-left:auto;display:flex;align-items:center;gap:4px;}

  /* EMPTY STATE */
  .empty-state{grid-column:1/-1;padding:60px 20px;text-align:center;}
  .empty-icon{font-size:48px;margin-bottom:16px;}
  .empty-title{font-size:16px;font-weight:500;color:var(--text-main);margin-bottom:8px;}
  .empty-sub{font-size:13px;color:var(--text-dim);}

  /* PROGRESS BAR on card */
  .card-progress{height:3px;background:var(--bg-card2);margin-top:10px;border-radius:2px;overflow:hidden;}
  .card-progress-fill{height:100%;border-radius:2px;background:var(--mint);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .lesson-card{animation:fadeUp .4s ease both;}
</style>
</head>
<body>
<div class="page">

  <nav>
    <a href="home.html" class="nav-logo">lo<span>.</span>fi<span>·</span>focus</a>
    <div class="nav-links">
      <a href="home.html">Головна</a>
      <a href="lessons.html" class="active">Уроки</a>
      <a href="progress.html">Прогрес</a>
      <a href="notes.html">Нотатки</a>
    </div>
    <div class="nav-avatar" id="nav-avatar">??</div>
  </nav>

  <div class="page-header">
    <div>
      <div class="page-title">Каталог <span class="accent">уроків</span></div>
    </div>
    <div class="lessons-count" id="lessons-count">Завантаження...</div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <!-- Інструменти -->
    <div class="filter-group" id="inst-filters">
      <button class="filter-btn active" data-inst="all" onclick="setFilter('inst','all',this)">Всі</button>
      <button class="filter-btn" data-inst="guitar"  onclick="setFilter('inst','guitar',this)">🎸 Гітара</button>
      <button class="filter-btn" data-inst="piano"   onclick="setFilter('inst','piano',this)">🎹 Фортепіано</button>
      
      <button class="filter-btn" data-inst="violin"  onclick="setFilter('inst','violin',this)">🎻 Скрипка</button>
      <button class="filter-btn" data-inst="flute"   onclick="setFilter('inst','flute',this)">🎵 Флейта</button>
      <button class="filter-btn" data-inst="vocal"   onclick="setFilter('inst','vocal',this)">🎤 Вокал</button>
    </div>

    <div class="filter-sep"></div>

    <!-- Рівень -->
    <div class="filter-group">
      <button class="filter-btn active" data-lvl="all"      onclick="setFilter('lvl','all',this)">Всі рівні</button>
      <button class="filter-btn lvl-beginner" data-lvl="beginner" onclick="setFilter('lvl','beginner',this)">🌱 Початківець</button>
      <button class="filter-btn lvl-middle"   data-lvl="middle"   onclick="setFilter('lvl','middle',this)">🎯 Середній</button>
      <button class="filter-btn lvl-advanced" data-lvl="advanced" onclick="setFilter('lvl','advanced',this)">🔥 Впевнений</button>
    </div>

    <!-- Пошук -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Пошук уроку..." id="search-input" oninput="renderCards()">
    </div>
  </div>

  <!-- GRID -->
  <div class="lessons-grid" id="lessons-grid"></div>

</div>

<script>
// ═══════════════════════════════════════
//  ДАНІ УРОКІВ
// ═══════════════════════════════════════
const ALL_LESSONS = [
  // ГІТАРА — ПОЧАТКІВЕЦЬ
  {id:'g-b-1', inst:'guitar', lvl:'beginner', title:'Як тримати гітару і ставити руки',       time:10, icon:'🎸', color:'#5ee7bf'},
  {id:'g-b-2', inst:'guitar', lvl:'beginner', title:'Перший акорд — Am',                      time:12, icon:'🎸', color:'#5ee7bf'},
  {id:'g-b-3', inst:'guitar', lvl:'beginner', title:'Перший акорд — E мажор',                 time:12, icon:'🎸', color:'#5ee7bf'},
  {id:'g-b-4', inst:'guitar', lvl:'beginner', title:'Перехід Am → E — плавно і впевнено',     time:15, icon:'🎸', color:'#5ee7bf'},
  {id:'g-b-5', inst:'guitar', lvl:'beginner', title:'Ритмічний бій 4/4 — відчуй пульс',       time:15, icon:'🎸', color:'#5ee7bf'},
  {id:'g-b-6', inst:'guitar', lvl:'beginner', title:'Акорд G мажор та перехід Am → G → E',   time:18, icon:'🎸', color:'#5ee7bf'},
  // ГІТАРА — СЕРЕДНІЙ
  {id:'g-m-1', inst:'guitar', lvl:'middle', title:'Баре на 1 ладу — акорд F',                 time:20, icon:'🎸', color:'#5ee7bf'},
  {id:'g-m-2', inst:'guitar', lvl:'middle', title:'Прогресія Am → F → C → G',                time:18, icon:'🎸', color:'#5ee7bf'},
  {id:'g-m-3', inst:'guitar', lvl:'middle', title:'Fingerpicking — базовий паттерн',          time:20, icon:'🎸', color:'#5ee7bf'},
  {id:'g-m-4', inst:'guitar', lvl:'middle', title:'Техніка мьют і приглушення струн',         time:15, icon:'🎸', color:'#5ee7bf'},
  // ГІТАРА — ВПЕВНЕНИЙ
  {id:'g-a-1', inst:'guitar', lvl:'advanced', title:'Легато — хаммер-он та пул-оф',           time:22, icon:'🎸', color:'#5ee7bf'},
  {id:'g-a-2', inst:'guitar', lvl:'advanced', title:'Імпровізація в пентатоніці Ля мінор',    time:25, icon:'🎸', color:'#5ee7bf'},
  // ФОРТЕПІАНО — ПОЧАТКІВЕЦЬ
  {id:'p-b-1', inst:'piano', lvl:'beginner', title:'Позиція рук і перші ноти',                time:12, icon:'🎹', color:'#7aa2f7'},
  {id:'p-b-2', inst:'piano', lvl:'beginner', title:'Гама До мажор правою рукою',             time:15, icon:'🎹', color:'#7aa2f7'},
  {id:'p-b-3', inst:'piano', lvl:'beginner', title:'Прості мелодії — «Метелик»',             time:15, icon:'🎹', color:'#7aa2f7'},
  {id:'p-b-4', inst:'piano', lvl:'beginner', title:'Акорди лівою рукою — До, Фа, Соль',     time:18, icon:'🎹', color:'#7aa2f7'},
  // ФОРТЕПІАНО — СЕРЕДНІЙ
  {id:'p-m-1', inst:'piano', lvl:'middle', title:'Дві руки разом — координація',             time:20, icon:'🎹', color:'#7aa2f7'},
  {id:'p-m-2', inst:'piano', lvl:'middle', title:'Педаль — де і коли використовувати',       time:18, icon:'🎹', color:'#7aa2f7'},
  // УКУЛЕЛЕ — ПОЧАТКІВЕЦЬ
  {id:'u-b-1', inst:'drums', lvl:'beginner', title:'Налаштування барабани — GCEA',          time:10, icon:'🥁', color:'#ff9e64'},
  {id:'u-b-2', inst:'drums', lvl:'beginner', title:'Хват паличок та постановка рук',              time:12, icon:'🥁', color:'#ff9e64'},
  {id:'u-b-3', inst:'drums', lvl:'beginner', title:'Базовий рок-ритм — перша пісня',            time:15, icon:'🥁', color:'#ff9e64'},
  // СКРИПКА — ПОЧАТКІВЕЦЬ
  {id:'v-b-1', inst:'violin', lvl:'beginner', title:'Постановка смичка і руки',              time:12, icon:'🎻', color:'#e0af68'},
  {id:'v-b-2', inst:'violin', lvl:'beginner', title:'Перші ноти — відкриті струни',          time:15, icon:'🎻', color:'#e0af68'},
  {id:'v-b-3', inst:'violin', lvl:'beginner', title:'Гама Ре мажор',                        time:18, icon:'🎻', color:'#e0af68'},
  // ФЛЕЙТА — ПОЧАТКІВЕЦЬ
  {id:'f-b-1', inst:'flute', lvl:'beginner', title:'Постановка амбушюра — перший звук',      time:12, icon:'🎵', color:'#bb9af7'},
  {id:'f-b-2', inst:'flute', lvl:'beginner', title:'Ноти Сі, Ля, Соль — перший октав',      time:15, icon:'🎵', color:'#bb9af7'},
  {id:'f-b-3', inst:'flute', lvl:'beginner', title:'Перша мелодія — «Ода до радості»',       time:18, icon:'🎵', color:'#bb9af7'},
  // ФЛЕЙТА — СЕРЕДНІЙ
  {id:'f-m-1', inst:'flute', lvl:'middle', title:'Вібрато на флейті — техніка',              time:20, icon:'🎵', color:'#bb9af7'},
  {id:'f-m-2', inst:'flute', lvl:'middle', title:'Гами у другому октаві',                   time:18, icon:'🎵', color:'#bb9af7'},
  // ВОКАЛ — ПОЧАТКІВЕЦЬ
  {id:'vo-b-1', inst:'vocal', lvl:'beginner', title:'Дихання діафрагмою — базові вправи',   time:12, icon:'🎤', color:'#f7768e'},
  {id:'vo-b-2', inst:'vocal', lvl:'beginner', title:'Розспівка — терції та кварти',         time:15, icon:'🎤', color:'#f7768e'},
  {id:'vo-b-3', inst:'vocal', lvl:'beginner', title:'Резонатори — грудний і головний',      time:15, icon:'🎤', color:'#f7768e'},
  // ВОКАЛ — СЕРЕДНІЙ
  {id:'vo-m-1', inst:'vocal', lvl:'middle', title:'Мікрофонна техніка та дистанція',        time:18, icon:'🎤', color:'#f7768e'},
  {id:'vo-m-2', inst:'vocal', lvl:'middle', title:'Розширення діапазону — вправи',          time:20, icon:'🎤', color:'#f7768e'},
];

const LEVEL_LABEL = { beginner:'Початківець', middle:'Середній', advanced:'Впевнений' };
const INST_LABEL  = { guitar:'Гітара', piano:'Фортепіано', drums:'Барабани', violin:'Скрипка', flute:'Флейта', vocal:'Вокал' };

// ── Стан фільтрів ──
const filters = { inst: 'all', lvl: 'all' };
let userInst = 'guitar';
let completedIds = [];

// ── Init ──
window.addEventListener('load', () => {
  const raw = localStorage.getItem('lofi_user');
  if (!raw) { window.location.href = 'index.html'; return; }
  const user = JSON.parse(raw);

  userInst     = user.instrument || 'guitar';
  completedIds = user.completedLessons || [];

  // Аватар
  const name = (user.name || '??').trim();
  document.getElementById('nav-avatar').textContent =
    name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  // Автофільтр по інструменту користувача
  setFilter('inst', userInst,
    document.querySelector(`[data-inst="${userInst}"]`) || document.querySelector('[data-inst="all"]')
  );
});

// ── Фільтри ──
function setFilter(type, value, btn) {
  filters[type] = value;
  // Підсвітити кнопку
  const group = type === 'inst' ? '#inst-filters .filter-btn' : '.filter-group:nth-child(3) .filter-btn';
  document.querySelectorAll(type === 'inst'
    ? '[data-inst]' : '[data-lvl]'
  ).forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCards();
}

// ── Рендер карток ──
function renderCards() {
  const query  = document.getElementById('search-input').value.toLowerCase().trim();
  const grid   = document.getElementById('lessons-grid');

  let visible = ALL_LESSONS.filter(l => {
    if (filters.inst !== 'all' && l.inst !== filters.inst) return false;
    if (filters.lvl  !== 'all' && l.lvl  !== filters.lvl)  return false;
    if (query && !l.title.toLowerCase().includes(query))    return false;
    return true;
  });

  document.getElementById('lessons-count').textContent =
    `${visible.length} ${visible.length === 1 ? 'урок' : visible.length < 5 ? 'уроки' : 'уроків'}`;

  if (visible.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <div class="empty-title">Нічого не знайдено</div>
        <div class="empty-sub">Спробуй змінити фільтри або пошуковий запит</div>
      </div>`;
    return;
  }

  grid.innerHTML = visible.map((l, idx) => {
    const done   = completedIds.includes(l.id);
    const lvlCls = l.lvl;
    const delay  = (idx % 9) * 0.04;

    return `
      <a href="practice.html?lesson=${l.id}" class="lesson-card${done ? ' done' : ''}"
         style="animation-delay:${delay}s;">
        <div class="card-thumb">
          <div class="card-thumb-bg" style="background:${l.color};"></div>
          <div class="card-thumb-icon">${l.icon}</div>
          <div class="card-num">#${String(idx + 1).padStart(2,'0')}</div>
          ${done ? '<div class="card-done-badge">✓</div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-inst">${l.icon} ${INST_LABEL[l.inst]}</div>
          <div class="card-title">${l.title}</div>
          <div class="card-meta">
            <span class="card-pill ${lvlCls}">${LEVEL_LABEL[l.lvl]}</span>
            <span class="card-time">⏱ ${l.time} хв</span>
          </div>
          ${done ? '<div class="card-progress"><div class="card-progress-fill" style="width:100%"></div></div>' : ''}
        </div>
      </a>`;
  }).join('');
}
</script>
</body>
</html>
